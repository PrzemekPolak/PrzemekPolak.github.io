<body>

<video id="video" width="320" height="240" autoplay></video>
<button id="click-photo">Click Photo</button>
<canvas id="canvas" width="320" height="240"></canvas>
<button id="send-photo">Send Photo</button>

<script type="module">
	// Import the functions you need from the SDKs you need
	import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-app.js";

	  appId: "1:159195890226:web:a0bc97821d22b0d307b22b"
	};
  
	// Initialize Firebase
	const app = initializeApp(firebaseConfig);

	import { getStorage, ref, uploadBytes, getDownloadURL, updateMetadata, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-storage.js";


let camera_button = document.querySelector("#start-camera");
let video = document.querySelector("#video");
let click_button = document.querySelector("#click-photo");
let canvas = document.querySelector("#canvas");
let send_button = document.querySelector("#send-photo");

camera_button.addEventListener('click', async function() {
   	let stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
	video.srcObject = stream;
});

click_button.addEventListener('click', function() {
   	canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
   	let image_data_url = canvas.toDataURL('image/jpeg');

   	// data url of the image
   	console.log(image_data_url);
});

send_button.addEventListener('click', ddd);


async function ddd() {
	var c = canvas.getContext('2d');

	const fff = await new Promise(resolve => c.toBlob(resolve));

	const storage = getStorage();
	const storageRef = ref(storage, 'tteesstt');

	const metadata = {
		contentType: 'image/jpeg',
	};

	uploadBytes(storageRef, fff,metadata).then((snapshot) => {
		console.log('Uploaded a blob or file!');
	});
}

</script>
